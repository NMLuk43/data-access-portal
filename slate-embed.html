<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School of Business Giving Portal Embed</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }

      .embed-shell {
        width: 100%;
        max-width: none;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .embed-frame {
        display: block;
        width: 100%;
        min-height: 100vh;
        border: 0;
        background: transparent;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <main class="embed-shell">
      <iframe
        id="dashboard-frame"
        class="embed-frame"
        src="https://nmluk43.github.io/data-access-portal/index.html?embedded=1&sourceOrigin=https%3A%2F%2Fconnect.cedarville.edu"
        title="School of Business Giving Dashboard"
        loading="lazy"
      ></iframe>
    </main>
    <script>
      const dashboardFrame = document.getElementById("dashboard-frame");
      const dashboardOrigin = "https://nmluk43.github.io";
      const donorDataUrl = "/portal/data-access-portal?cmd=fetch-donors";
      let donorPayload = null;
      let iframeReady = false;

      async function loadDonorPayload() {
        const response = await fetch(donorDataUrl, {
          credentials: "same-origin"
        });

        if (!response.ok) {
          throw new Error(`Request failed with status ${response.status}`);
        }

        donorPayload = await response.json();
        postPayloadIfReady();
      }

      function postPayloadIfReady() {
        if (!iframeReady || !donorPayload || !dashboardFrame.contentWindow) {
          return;
        }

        dashboardFrame.contentWindow.postMessage(
          {
            type: "donor-data",
            payload: donorPayload
          },
          dashboardOrigin
        );
      }

      window.addEventListener("message", (event) => {
        if (event.origin !== dashboardOrigin) {
          return;
        }

        if (event.data && event.data.type === "donor-data-ready") {
          iframeReady = true;
          postPayloadIfReady();
        }

        if (event.data && event.data.type === "dashboard-height" && Number.isFinite(event.data.height)) {
          dashboardFrame.style.height = `${Math.max(1200, Math.ceil(event.data.height))}px`;
        }
      });

      loadDonorPayload().catch((error) => {
        console.error(error);
      });
    </script>
  </body>
</html>
