<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School of Business Giving Portal Embed</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #f5f7fb;
        font-family: Georgia, "Times New Roman", serif;
      }

      .embed-shell {
        width: 100%;
        max-width: 1600px;
        margin: 0 auto;
        padding: 16px;
        box-sizing: border-box;
      }

      .embed-frame {
        display: block;
        width: 100%;
        min-height: 1600px;
        border: 0;
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <main class="embed-shell">
      <iframe
        class="embed-frame"
        src="https://nmluk43.github.io/data-access-portal/index.html?dataUrl=https%3A%2F%2Fconnect.cedarville.edu%2Fportal%2Fdata-access-portal%3Fcmd%3Dfetch-donors"
        title="School of Business Giving Dashboard"
        loading="lazy"
      ></iframe>
    </main>
  </body>
</html>
